<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Search, filter and bookmark news articles from The Guardian using the Smart News Explorer app. Browse sections, filter by date, and save articles for later reading."
    />
    <meta
      name="keywords"
      content="news explorer, guardian news api, news search app, javascript news app, bookmark news articles"
    />
    <meta name="author" content="Fahim Adam" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/style.css" />

    <title>Smart News Explorer | Search & Bookmark Guardian News</title>
  </head>
  <body>
    <header>
      <!-- ─── NAVBAR ─────────────────────────────────────────────────────────── -->
      <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container">
          <!-- Brand -->
          <a class="navbar-brand fw-bold" href="index.html">
            Smart News Explorer
          </a>

          <!-- Nav Links -->
          <div class="justify-content-end" id="navbarContent">
            <div class="d-flex gap-3">
              <a href="index.html" class="btn btn-outline-primary">
                Search News
              </a>
              <a
                href="bookmarks.html"
                id="bookmarksBtn"
                class="btn btn-primary"
              >
                Bookmarks
              </a>
            </div>
          </div>
        </div>
      </nav>

      <!-- ─── HERO SECTION ───────────────────────────────────────────────────── -->
      <section class="hero-section text-white text-center py-5">
        <div class="container">
          <!-- Title -->
          <h1 class="fw-bold display-6 mb-3">
            <i class="bi bi-newspaper px-2"></i> Smart News Explorer
          </h1>

          <!-- Subtitle -->
          <p class="lead mb-4">
            Search, filter, and analyse news from The Guardian. Bookmark
            articles and organise them into collections.
          </p>

          <!-- Search Card -->
          <div
            class="search-card card shadow-lg border-0 p-4 mx-auto col-lg-12 col-md-10"
          >
            <!-- Search Input + Button -->
            <form id="searchForm">
              <div class="row g-2 mb-3">
                <div class="col-12 col-md-9">
                  <input
                    type="text"
                    id="searchInput"
                    class="form-control form-control-lg"
                    placeholder="Search for news..."
                  />
                </div>
                <div class="col-12 col-md-3 d-grid">
                  <button class="btn btn-primary btn-lg searchBtn">
                    Search
                  </button>
                </div>
              </div>
            </form>

            <!-- Filter Controls -->
            <div class="row g-2">
              <!-- Section Filter - populated dynamically from Guardian API -->
              <div class="col-md-3">
                <label for="sectionSelect" class="form-label small text-muted"
                  >Section</label
                >
                <select id="sectionSelect" class="form-select">
                  <option value="all" selected>All Section</option>
                </select>
              </div>

              <!-- From Date Filter -->
              <div class="col-md-3">
                <label for="fromDate" class="form-label small text-muted">
                  From
                </label>
                <input id="fromDate" type="date" class="form-control" />
              </div>

              <!-- To Date Filter -->
              <div class="col-md-3">
                <label for="toDate" class="form-label small text-muted">
                  To
                </label>
                <input id="toDate" type="date" class="form-control" />
              </div>

              <!-- Sort Order Filter -->
              <div class="col-md-3">
                <label for="sortSelect" class="form-label small text-muted"
                  >Sort By</label
                >
                <select id="sortSelect" class="form-select">
                  <option selected value="newest">Newest First</option>
                  <option value="oldest">Oldest First</option>
                  <option value="relevance">Relevance</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </section>
    </header>

    <!-- ─── MAIN CONTENT ──────────────────────────────────────────────────────── -->
    <main class="bg-light py-4">
      <!-- Article Cards - rendered dynamically by view.js -->
      <section id="results_cards">
        <div class="container mt-5">
          <div id="results" class="row g-4 gy-5"></div>
        </div>
      </section>

      <!-- Load More Button - shown/hidden by updateLoadMoreBtn() in view.js -->
      <div class="container my-4 text-center">
        <button id="loadMoreBtn" class="btn btn-outline-primary">
          Load more
        </button>
      </div>
    </main>

    <!-- ─── FOOTER ────────────────────────────────────────────────────────────── -->
    <footer class="py-4">
      <div class="container text-center small text-muted">
        Powered by
        <a
          href="https://open-platform.theguardian.com/"
          target="_blank"
          class="text-decoration-none text-muted"
        >
          The Guardian Open Platform API
        </a>
      </div>
    </footer>

    <!-- Entry point - imports model.js and view.js as ES modules -->
    <script type="module" src="assets/js/controller.js"></script>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
