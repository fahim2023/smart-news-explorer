<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <!-- NAVBAR -->
      <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container">
          <!-- Brand -->
          <a class="navbar-brand fw-bold" href="#"> Smart News Explorer </a>

          <!-- Mobile Toggle -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Nav Items -->
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarContent"
          >
            <div class="d-flex gap-3">
              <button class="btn btn-outline-primary">Search</button>
              <button id="bookmarkBtn" class="btn btn-outline-secondary">
                Bookmarks
              </button>
            </div>
          </div>
        </div>
      </nav>

      <!-- HERO SECTION -->
      <section class="hero-section text-white text-center py-5">
        <div class="container">
          <!-- Title -->
          <h1 class="fw-bold display-5 mb-3">Smart News Explorer</h1>

          <!-- Subtitle -->
          <p class="lead mb-4">
            Search, filter, and analyse news from The Guardian. Bookmark
            articles and organise them into collections.
          </p>

          <!-- Search Card -->
          <div
            class="search-card card shadow-lg border-0 p-4 mx-auto col-lg-12 col-md-10"
          >
            <!-- Search Row -->
            <form id="searchForm">
              <div class="row g-2 mb-3">
                <div class="col-12 col-md-9">
                  <input
                    type="text"
                    id="searchInput"
                    class="form-control form-control-lg"
                    placeholder="Search for news..."
                  />
                </div>

                <div class="col-12 col-md-3 d-grid">
                  <button class="btn btn-primary btn-lg searchBtn">
                    Search
                  </button>
                </div>
              </div>
            </form>
            <!-- Filters Row -->
            <div class="row g-2">
              <div class="col-md-3">
                <select id="sectionSelect" class="form-select">
                  <option value="all" selected>All Section</option>
                  <!-- <option value="technology">Technology</option>
                  <option value="business">Business</option>
                  <option value="politics">Politics</option>
                  <option value="science">Science</option>
                  <option value="environment">Environment</option>
                  <option value="sport">Sports</option>
                  <option value="culture">Culture</option>
                  <option value="world">World</option>
                  <option value="education">Education</option>
                  <option value="society">Society</option> -->
                </select>
              </div>

              <div class="col-md-3">
                <input id="fromDate" type="date" class="form-control" />
              </div>

              <div class="col-md-3">
                <input id="toDate" type="date" class="form-control" />
              </div>

              <div class="col-md-3">
                <select id="sortSelect" class="form-select">
                  <option selected value="newest">Newest First</option>
                  <option value="oldest">Oldest First</option>
                  <option value="relevance">Relevance</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </section>
    </header>
    <main class="bg-light py-4">
      <section id="results_cards">
        <div class="container mt-5">
          <div id="results" class="row g-4"></div>
        </div>
      </section>
      <div class="container my-4 text-center">
        <button id="loadMoreBtn" class="btn btn-outline-primary">
          Load more
        </button>
      </div>
    </main>
    <footer class="py-4 mt-5 border-top">
      <div class="container text-center small text-muted">
        Powered by
        <a
          href="https://open-platform.theguardian.com/"
          target="_blank"
          class="text-decoration-none"
        >
          The Guardian Open Platform API
        </a>
      </div>
    </footer>
    <script type="module" src="assets/js/controller.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
