<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <!-- NAVBAR -->
      <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container">
          <!-- Brand -->
          <a class="navbar-brand fw-bold" href="#"> Smart News Explorer </a>

          <!-- Mobile Toggle -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Nav Items -->
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarContent"
          >
            <div class="d-flex gap-3">
              <button class="btn btn-outline-primary">Search</button>
              <button class="btn btn-outline-secondary">Bookmarks</button>
            </div>
          </div>
        </div>
      </nav>

      <!-- HERO SECTION -->
      <section class="hero-section text-white text-center py-5">
        <div class="container">
          <!-- Title -->
          <h1 class="fw-bold display-5 mb-3">Smart News Explorer</h1>

          <!-- Subtitle -->
          <p class="lead mb-4">
            Search, filter, and analyse news from The Guardian. Bookmark
            articles and organise them into collections.
          </p>

          <!-- Search Card -->
          <div
            class="search-card card shadow-lg border-0 p-4 mx-auto col-lg-12 col-md-10"
          >
            <!-- Search Row -->
            <div class="row g-2 mb-3">
              <div class="col-12 col-md-9">
                <input
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="Search for news..."
                />
              </div>

              <div class="col-12 col-md-3 d-grid">
                <button class="btn btn-primary btn-lg">Search</button>
              </div>
            </div>

            <!-- Filters Row -->
            <div class="row g-2">
              <div class="col-md-3">
                <select class="form-select">
                  <option value="all" selected>All Section</option>
                  <option value="tech">Technology</option>
                  <option value="business">Business</option>
                  <option value="politics">Politics</option>
                  <option value="science">Science</option>
                  <option value="enviroment">Enviroment</option>
                  <option value="sports">Sports</option>
                  <option value="culture">Culture</option>
                  <option value="world">World</option>
                  <option value="health">Health</option>
                  <option value="education">Education</option>
                </select>
              </div>

              <div class="col-md-3">
                <input type="date" class="form-control" />
              </div>

              <div class="col-md-3">
                <input type="date" class="form-control" />
              </div>

              <div class="col-md-3">
                <select class="form-select">
                  <option selected>Newest First</option>
                  <option>Oldest First</option>
                  <option>Relevance</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </section>
    </header>
    <script src="assets/js/model.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
