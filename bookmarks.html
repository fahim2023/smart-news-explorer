<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="View and manage your bookmarked news articles saved from The Guardian using Smart News Explorer. Quickly access stories you saved for later reading."
    />
    <meta
      name="keywords"
      content="bookmarked articles, saved news, guardian news bookmarks, news reader app"
    />
    <meta name="author" content="Fahim Adam" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/style.css" />

    <title>Bookmarked Articles | Smart News Explorer</title>
  </head>

  <body>
    <!-- ─── NAVBAR ─────────────────────────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
      <div class="container flex-column flex-sm-row align-items-center gap-3">
        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="index.html">
          Smart News Explorer
        </a>

        <!-- Nav Links -->
        <div class="d-flex gap-3">
          <a href="index.html" class="btn btn-outline-primary"> Search News </a>
          <a href="bookmarks.html" class="btn btn-primary"> Bookmarks </a>
        </div>
      </div>
    </nav>

    <!-- ─── PAGE HEADER ────────────────────────────────────────────────────── -->
    <header class="py-5 bg-light text-center">
      <div class="container">
        <h1 class="fw-bold">Your Bookmarked Articles</h1>
        <p class="text-muted">Articles you saved for later reading.</p>
      </div>
    </header>

    <!-- ─── MAIN CONTENT ──────────────────────────────────────────────────── -->
    <main class="bg-light py-4">
      <section class="container mt-5">
        <!-- Empty state - shown by renderBookmarks() when no bookmarks exist -->
        <div id="emptyState" class="text-center text-muted d-none"></div>

        <!-- Bookmark cards - rendered dynamically by renderBookmarks() in view.js -->
        <div id="bookmarksResults" class="row g-4"></div>
      </section>
    </main>

    <!-- ─── FOOTER ────────────────────────────────────────────────────────── -->
    <footer class="py-4">
      <div class="container text-center small text-muted">
        Powered by
        <a
          href="https://open-platform.theguardian.com/"
          target="_blank"
          class="text-decoration-none text-muted"
        >
          The Guardian Open Platform API
        </a>
      </div>
    </footer>

    <!-- Entry point for bookmarks page -->
    <script type="module" src="assets/js/bookmarkController.js"></script>
  </body>
</html>
